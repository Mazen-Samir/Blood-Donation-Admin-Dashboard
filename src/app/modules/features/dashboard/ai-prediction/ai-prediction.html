<section class="p-5 bg-gray-100">
    <!-- HEADER -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-medium py-1.5">AI Blood Demand Predictions</h1>
            <p class="text-gray-500">AI powered blood demand forecasting and analysis</p>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-5">
        <div class="bg-white p-6 rounded-lg shadow border border-gray-300">
            <div class="flex items-center justify-between ">
                <h2 class="text-lg font-medium text-gray-500">Current Status</h2>
                <i class="fa-solid fa-arrow-trend-up text-xl text-amber-700"></i>
            </div>
            <h2 class="text-4xl font-bold py-3">Medium</h2>
            <p class="text-sm text-gray-500">Demand Level</p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow border border-gray-300">
            <div class="flex items-center justify-between ">
                <h2 class="text-lg font-medium text-gray-500">Next 7 Days</h2>
                <i class="fa-solid fa-calendar text-xl text-blue-700"></i>
            </div>
            <h2 class="text-4xl font-bold py-3">485</h2>
            <p class="text-sm text-gray-500">Expected units needs</p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow border border-gray-300">
            <div class="flex items-center justify-between ">
                <h2 class="text-lg font-medium text-gray-500">Prediction Accuracy</h2>
                <i class="fa-solid fa-circle-exclamation text-xl text-green-700"></i>
            </div>
            <h2 class="text-4xl font-bold py-3">98%</h2>
            <p class="text-sm text-gray-500">Based on historical data and AI models</p>
        </div>

    </div>

    <!-- CHARTS -->

        <!-- LINE CHART -->
        <div class="bg-white mt-7 p-4 rounded-lg shadow border border-gray-300">
            <h1 class="text-2xl font-medium p-1">Blood Usage Over Time</h1>
            <div class="card p-4 ml-8">
                <p-chart type="line" [data]="data" [options]="options" class="h-100" />
            </div>
        </div>

        <!-- BAR CHART -->
        <div class="bg-white mt-7 p-4 rounded-lg shadow border border-gray-300">
            <h1 class="text-2xl font-medium p-1">7-Day Demand Forecast</h1>
            <div class="card p-4 ml-8">
                <p-chart type="bar" [data]="barChart_data" [options]="barChart_options" class="h-120" />
            </div>
        </div>
</section>
