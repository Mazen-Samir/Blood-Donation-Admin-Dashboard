<section class="p-5 bg-gray-100">
    <!-- HEADER -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-medium py-1.5">Manage Users</h1>
            <p class="text-gray-500">View and manage registered donors</p>
        </div>
        <div>
            <button class="bg-red-500 cursor-pointer hover:bg-red-600 transition duration-300 py-2 px-4 rounded-lg text-white">
                <i class="fa-solid fa-plus"></i>
                <span class="ml-1">Add User</span>
            </button>
        </div>
    </div>.

    <!-- SEARCH BAR -->
     <div class="w-full bg-white p-5 rounded-xl border border-gray-300">
        <div class="flex items-center gap-2 px-4 py-2 border border-gray-300 rounded-xl">
            <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
            <input type="text" placeholder="Search by name, blood type or phone" class="w-full outline-none placeholder:text-gray-500">
        </div>
     </div>

    <!-- TABLE -->
    <div class="mt-8 border border-gray-300 rounded-lg bg-white">
        <p-table [value]="users" [tableStyle]="{ 'min-width': '60rem' }" class="bg-white"
            [paginator]="true" [rows]="6" [rowsPerPageOptions]="[5, 10, 20]">
            <ng-template #header>
                <tr class="bg-gray-200">
                    <th class="">NAME</th>
                    <th>BLOOD TYPE</th>
                    <th>PHONE</th>
                    <th>LAST DONATION</th>
                    <th>POINTS</th>
                    <th>STATUS</th>
                    <th>ACTIONS</th>
                </tr>
            </ng-template>
            <ng-template #body let-user>
                <tr class="bg-white! hover:bg-gray-100! transition! duration-300 ease-in-out">
                    <td class="text-gray-800! font-bold">
                        {{ user.name }}
                    </td>
                    <td class="text-red-800! font-medium">
                        <div class=" flex items-center justify-center">
                            <div class="bg-red-400/20 py-2 px-3 text-sm rounded-xl">
                                {{ user.bloodType }}
                            </div>
                        </div>
                    </td>
                    <td class="text-gray-400! font-medium">
                        {{ user.phone }}
                    </td>
                    <td class="text-gray-400! font-medium">
                        {{ user.lastDonation }}
                    </td>
                    <td class="text-gray-600! font-medium">
                        {{ user.points }}
                    </td>
                    <td>
                        <p-tag [value]="user.status" [severity]="getSeverity(user.status)" />
                    </td>
                    <td>
                        <div class="flex items-center justify-center gap-5 text-sm">
                            <button class="cursor-pointer">
                                <i class="fa-regular fa-eye text-blue-600"></i>
                            </button>
                            <button class="cursor-pointer">
                                <i class="fa-regular fa-circle-check text-green-600"></i>
                            </button>
                            <button class="cursor-pointer">
                                <i class="fa-solid fa-award text-yellow-600"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </ng-template>
            <!-- <ng-template #footer>
                <tr class="bg-gray-200">
                    <td colspan="6">In total there are {{ bloodInventory ? bloodInventory.length : 0 }} products.</td>
                </tr>
            </ng-template> -->
        </p-table>
    </div>
</section>
