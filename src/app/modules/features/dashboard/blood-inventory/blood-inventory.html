<section class="p-5 bg-gray-100">
    <!-- HEADER -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-medium py-1.5">Blood Inventory Managment</h1>
            <p class="text-gray-500">Track and manage blood stock levels</p>
        </div>
        <div>
            <div class="card flex justify-center">
                <!-- <p-button (click)="showDialog()" label="Add Blood Bag" /> -->
                <button
                    (click)="showDialog()" 
                    class="bg-red-500 cursor-pointer hover:bg-red-600 transition duration-300 py-2 px-4 rounded-lg text-white"
                    >
                    <i class="fa-solid fa-plus"></i>
                    <span class="ml-1">Add Blood Bag</span>
                </button>
                <p-dialog header="Add New Bag" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
                    <span class="p-text-secondary block mb-8">Blood information.</span>
                    <div class="flex items-center gap-4 mb-4">
                        <label for="username" class="font-semibold w-24">Blood Type</label>
                        <input pInputText id="username" class="flex-auto" autocomplete="off" />
                    </div>
                    <div class="flex items-center gap-4 mb-8">
                        <label for="email" class="font-semibold w-24">Quantity</label>
                        <input pInputText id="email" class="flex-auto" autocomplete="off" />
                    </div>
                    <div class="flex justify-end gap-2">
                        <p-button label="Cancel" severity="secondary" (click)="visible = false" />
                        <p-button label="Save" (click)="visible = false" />
                    </div>
                </p-dialog>
            </div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 mt-5">
        <div class="bg-white p-6 rounded-lg shadow border border-gray-300">
            <h2 class="text-lg font-medium text-gray-500">Total Units</h2>
            <p class="text-2xl py-2 font-bold">234</p>
        </div>
        <div class="bg-green-50 p-6 rounded-lg shadow border border-green-300">
            <h2 class="text-lg font-medium text-green-600">Available</h2>
            <p class="text-2xl py-2 font-bold">165</p>
        </div>
        <div class="bg-yellow-50 p-6 rounded-lg shadow border border-yellow-300">
            <h2 class="text-lg font-medium text-yellow-600">Low Stock</h2>
            <p class="text-2xl py-2 font-bold">34</p>
        </div>
        <div class="bg-red-50 p-6 rounded-lg shadow border border-red-300">
            <h2 class="text-lg font-medium text-red-600">Critical</h2>
            <p class="text-2xl py-2 font-bold">5</p>
        </div>

    </div>


    <!-- REFRESH BUTTON -->
     <div class="p-4">
        <button 
            class="bg-blue-500 cursor-pointer hover:bg-blue-600 transition duration-300 py-2 px-4 rounded-lg text-white flex gap-3 items-center"
            >
            <span>Reloud Data</span>
            <i class="fa-solid fa-refresh text-white"></i>
        </button>
     </div>

    <!-- TABLE -->
    <div class="mt-0 border border-gray-300 rounded-lg bg-white">
        <p-table [value]="bloodInventory" [tableStyle]="{ 'min-width': '60rem' }" class="bg-white">
            <ng-template #header>
                <tr class="bg-gray-200">
                    <th class="">BLOOD TYPE</th>
                    <th>QUANTITY</th>
                    <th>EXPIRY DATE</th>
                    <th>STATUS</th>
                    <!-- <th>ACTIONS</th> -->
                </tr>
            </ng-template>
            <ng-template #body let-bag>
                <tr class="bg-white!">
                    <td class="text-red-600! font-bold">
                        {{ bag.bloodType }}
                    </td>
                    <td class="text-gray-600! font-medium">
                        {{ bag.quantity }}
                        units
                    </td>
                    <td class="text-red-600! font-medium">
                        {{ bag.expirtionDate }}
                    </td>
                    <td>
                        <p-tag [value]="bag.status" [severity]="getSeverity(bag.status)" />
                    </td>
                    <!-- <td>
                        <div class="flex items-center justify-center gap-5 text-sm">
                            <button class="cursor-pointer">
                                <i class="fa-solid fa-plus text-green-600"></i>
                            </button>
                            <button class="cursor-pointer">
                                <i class="fa-solid fa-minus text-red-600"></i>
                            </button>
                            <button class="cursor-pointer">
                                <i class="fa-solid fa-arrows-rotate text-blue-600"></i>
                            </button>
                        </div>
                    </td> -->
                </tr>
            </ng-template>
            <!-- <ng-template #footer>
                <tr class="bg-gray-200">
                    <td colspan="6">In total there are {{ bloodInventory ? bloodInventory.length : 0 }} products.</td>
                </tr>
            </ng-template> -->
        </p-table>
    </div>

</section>
